<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Bloom · Focus Garden</title>
<meta name="description" content="A garden grown from focus. Every session blooms into a flower that will never appear again.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700&family=Newsreader:ital,opsz@0,6..72;1,6..72&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
  Babel.registerPreset('react-classic', {
    presets: [[Babel.availablePresets['react'], { runtime: 'classic' }]]
  });
</script>
<style>
/* @@STYLE@@ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --paper:#F7F4EF;--paper-2:#EFEAE1;--paper-3:#E7E0D4;--card:#FCFAF6;
  --ink:#26221C;--ink-2:#6B6358;--ink-3:#A39A8C;--ink-4:#C9C0B2;
  --line:rgba(38,34,28,.08);--line-2:rgba(38,34,28,.14);
  --accent:#C2603F;--accent-2:#A84E30;
  --m-rose:#C99A93;--m-clay:#C2855E;--m-gold:#C9A857;--m-sage:#8FA081;
  --m-teal:#7E9D98;--m-sky:#8AA2B8;--m-lav:#A294B0;--m-plum:#A87E8C;
  --dark:#17150F;--dark-2:#211E17;
  --serif:'Fraunces',Georgia,serif;
  --news:'Newsreader',Georgia,serif;
  --sans:'Inter',-apple-system,system-ui,sans-serif;
  --ease:cubic-bezier(.4,0,.15,1);--spring:cubic-bezier(.34,1.4,.5,1);
}
html{scroll-behavior:smooth}
html,body{width:100%;overflow-x:hidden}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
svg.ic{width:1em;height:1em;display:inline-block;vertical-align:-.13em;fill:none}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:var(--ink-4);border-radius:8px}
.tap{cursor:pointer;transition:opacity .18s var(--ease),transform .18s var(--ease)}
.tap:active{transform:scale(.97)}
img,svg{display:block}

/* ---- layout ---- */
.wrap{max-width:1120px;margin:0 auto;padding:0 28px}
section{position:relative}
.eyebrow{font:600 11px var(--sans);letter-spacing:.24em;text-transform:uppercase;color:var(--accent)}
.serif-hero{font:400 clamp(40px,7.2vw,84px) var(--serif);line-height:1.02;letter-spacing:-1.4px}
.serif-xl{font:400 clamp(30px,4.2vw,46px) var(--serif);line-height:1.08;letter-spacing:-.6px}
.serif-l{font:400 24px var(--serif);letter-spacing:-.3px}
.serif-it{font-style:italic}
.lead{font:400 clamp(16px,1.7vw,19px) var(--sans);color:var(--ink-2);line-height:1.68}
.num{font-variant-numeric:tabular-nums}

/* ---- nav ---- */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(247,244,239,.82);backdrop-filter:saturate(1.4) blur(18px);border-bottom:1px solid transparent;transition:border-color .3s,background .3s}
.nav.scrolled{border-bottom-color:var(--line);background:rgba(247,244,239,.92)}
.nav-in{max-width:1120px;margin:0 auto;padding:0 28px;height:66px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:10px;font:500 20px var(--serif);letter-spacing:-.2px}
.brand-mark{width:30px;height:30px}
.nav-links{display:flex;align-items:center;gap:30px}
.nav-links a{font:500 14px var(--sans);color:var(--ink-2);transition:color .18s}
.nav-links a:hover{color:var(--ink)}
.nav-right{display:flex;align-items:center;gap:14px}
.lang-wrap{position:relative}
.lang-btn{display:inline-flex;align-items:center;gap:6px;font:600 12px var(--sans);letter-spacing:.02em;color:var(--ink-2);border:1px solid var(--line-2);border-radius:20px;padding:6px 12px;background:none;cursor:pointer;transition:.18s}
.lang-btn:hover{border-color:var(--ink-3);color:var(--ink)}
.lang-caret{width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid currentColor;opacity:.6;transition:transform .2s}
.lang-caret.up{transform:rotate(180deg)}
.lang-menu{position:absolute;top:calc(100% + 8px);right:0;min-width:132px;background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:0 18px 44px -18px rgba(20,16,30,.4);padding:5px;display:flex;flex-direction:column;gap:2px;z-index:60}
.lang-opt{display:flex;align-items:center;justify-content:space-between;gap:10px;font:500 13px var(--sans);color:var(--ink-2);background:none;border:none;border-radius:8px;padding:8px 11px;cursor:pointer;transition:.15s;text-align:left}
.lang-opt:hover{background:var(--paper-2);color:var(--ink)}
.lang-opt.on{color:var(--ink);font-weight:600}
.lang-opt.on svg{color:var(--accent)}
.btn{display:inline-flex;align-items:center;gap:8px;font:600 14px var(--sans);border:none;border-radius:26px;padding:12px 22px;cursor:pointer;transition:.2s var(--ease);white-space:nowrap}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:hover{background:var(--accent-2);transform:translateY(-1px);box-shadow:0 10px 24px -10px rgba(168,78,48,.6)}
.btn-ghost{background:none;color:var(--ink);border:1px solid var(--line-2)}
.btn-ghost:hover{border-color:var(--ink-3)}
/* app-store download badges */
.dl-badge{display:inline-flex;align-items:center;gap:11px;padding:10px 18px;border-radius:14px;background:#1A1712;color:#fff;text-decoration:none;transition:.2s var(--ease);border:1px solid transparent}
.dl-badge:hover{transform:translateY(-2px);box-shadow:0 12px 26px -12px rgba(26,23,18,.6);background:#000}
.dl-badge .dl-logo{display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dl-badge.apple .dl-logo{color:#fff}
.dl-badge .dl-txt{display:flex;flex-direction:column;line-height:1.1;text-align:left}
.dl-badge .dl-txt em{font:400 10px var(--sans);font-style:normal;letter-spacing:.02em;opacity:.85;text-transform:uppercase}
.dl-badge .dl-txt b{font:600 17px var(--sans);letter-spacing:-.2px;margin-top:1px}
.btn-sm{padding:9px 16px;font-size:13px}
.nav-menu-btn{display:none;flex-direction:column;justify-content:center;gap:5px;width:38px;height:38px;border:1px solid var(--line-2);border-radius:11px;background:none;cursor:pointer;padding:0 9px}
.nav-menu-btn span{display:block;height:2px;width:100%;background:var(--ink);border-radius:2px;transition:transform .28s var(--ease),opacity .2s var(--ease)}
.nav-menu-btn.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.nav-menu-btn.open span:nth-child(2){opacity:0}
.nav-menu-btn.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.nav-drawer{position:fixed;top:66px;left:0;right:0;background:rgba(247,244,239,.98);backdrop-filter:saturate(1.4) blur(18px);border-bottom:1px solid var(--line);display:flex;flex-direction:column;padding:8px 0;transform:translateY(-12px);opacity:0;pointer-events:none;transition:transform .3s var(--ease),opacity .3s var(--ease);max-height:calc(100vh - 66px);overflow-y:auto}
.nav-drawer.open{transform:none;opacity:1;pointer-events:auto}
.nav-drawer a{font:500 16px var(--sans);color:var(--ink);padding:15px 28px;border-bottom:1px solid var(--line)}
.nav-drawer a:last-child{border-bottom:none}
.nav-drawer-dl{margin:16px 28px 12px;justify-content:center;color:#fff!important;padding:14px 22px!important;border-bottom:none!important}

/* ---- hero ---- */
.hero{padding:150px 0 90px;position:relative;overflow:hidden}
.hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:36px;align-items:center}
.hero h1{margin:18px 0 22px}
.hero .lead{max-width:440px}
.hero-cta{display:flex;gap:14px;margin-top:34px;flex-wrap:wrap;align-items:center}
.hero-note{font:400 13px var(--sans);color:var(--ink-3);margin-top:16px;display:flex;align-items:center;gap:7px}
.hero-stage{position:relative;aspect-ratio:1/1;border-radius:28px;background:radial-gradient(120% 100% at 50% 8%,#211E29,#161420 55%,#0E0D12);display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 40px 90px -40px rgba(20,16,30,.7),inset 0 1px 0 rgba(255,255,255,.05)}
.hero-stage .stars{position:absolute;inset:0;pointer-events:none}
.hero-stage .star{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;animation:twinkle 4s ease-in-out infinite}
.hero-caption{position:absolute;bottom:22px;left:0;right:0;text-align:center;color:rgba(236,230,220,.62);font:400 13px var(--news);font-style:italic;padding:0 30px;line-height:1.5}
.floor{position:absolute;left:-4%;right:-4%;bottom:0;height:34%;background:radial-gradient(60% 100% at 50% 100%,rgba(143,160,129,.20),transparent 72%)}

/* ---- generic section ---- */
.sec{padding:96px 0}
.sec-head{max-width:640px;margin-bottom:52px}
.sec-head.center{margin-left:auto;margin-right:auto;text-align:center}
.sec-head h2{margin:14px 0 16px}

/* ---- product tour (flat grid) ---- */
.tour-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(28px,4vw,56px) clamp(24px,3vw,44px);max-width:1080px;margin:0 auto}
.tour-cell{display:flex;flex-direction:column;align-items:center;text-align:center}
.tour-phone{position:relative;width:100%;max-width:270px;aspect-ratio:393/852;margin:0 auto;border-radius:38px;overflow:hidden;background:var(--paper);box-shadow:0 34px 70px -38px rgba(20,16,30,.5),0 0 0 1px var(--line);transition:transform .4s var(--spring),box-shadow .4s var(--ease)}
.tour-phone.dark{background:#0E0D12}
.tour-cell:hover .tour-phone{transform:translateY(-6px);box-shadow:0 46px 88px -40px rgba(20,16,30,.58),0 0 0 1px var(--line)}
.tour-shot{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
/* animated in-phone demo — mirrors the app's real focus / mindful / sleep screens */
.tdemo{position:absolute;inset:0;display:flex;flex-direction:column;background:#F7F4EF;color:var(--ink);transition:opacity .3s linear;font-size:calc(0.9px + 1.1vw);container-type:inline-size}
.tdemo.dark{background:radial-gradient(120% 90% at 50% 6%,#211E29,#15131A 60%,#0E0D12);color:#EDE8DD}
.tdemo-bar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:4.5% 7% 0;font:600 3.4cqw var(--sans);color:var(--ink-2)}
.tdemo.dark .tdemo-bar{color:rgba(237,232,221,.7)}
.tdemo-notch{width:32%;height:4.2cqw;border-radius:3cqw;background:#111;opacity:.92}
.tdemo.dark .tdemo-notch{background:#000}
.tdemo-sig{width:8cqw;height:3cqw;border-radius:1px;background:currentColor;opacity:.5}
.tdemo-stack{position:relative;flex:1;min-height:0}
.tdemo-layer{position:absolute;inset:0;display:flex;flex-direction:column}
.tdemo-scroll{flex:1;overflow:hidden;display:flex;flex-direction:column;align-items:center;padding:3% 7% 0}
.tdemo-tabbar{flex-shrink:0;display:flex;justify-content:space-around;padding:3% 4% 4%;border-top:1px solid var(--line);font:600 2.9cqw var(--sans);color:var(--ink-4)}
.tdemo.dark .tdemo-tabbar{border-color:rgba(237,232,221,.1);color:rgba(237,232,221,.4)}
.tdemo-tabbar .on{color:var(--accent)}
.tdemo.dark .tdemo-tabbar .on{color:#C9A857}
/* head row: eyebrow + serif title + coin pill */
.tdemo-head{width:100%;display:flex;align-items:flex-start;justify-content:space-between;margin-top:1%}
.tdemo-eyebrow{font:600 2.9cqw var(--sans);letter-spacing:.2em;text-transform:uppercase;color:var(--accent)}
.tdemo.dark .tdemo-eyebrow{color:rgba(237,232,221,.55)}
.tdemo-title{font:400 6.4cqw var(--serif);line-height:1.05;letter-spacing:-.3px;margin-top:2%}
.tdemo-title i{font-family:var(--news);font-style:italic}
.tdemo-coinpill{display:inline-flex;align-items:center;gap:5px;padding:2% 3.5%;border-radius:20px;border:1px solid var(--line-2);font:700 3.4cqw var(--sans)}
.tdemo.dark .tdemo-coinpill{border-color:rgba(237,232,221,.2)}
.tdemo-coindot{width:3.6cqw;height:3.6cqw;border-radius:50%;background:radial-gradient(circle at 38% 32%,#FBE7A6,#E7C66B 62%,#C99B3A);flex-shrink:0}
/* segmented mode toggle */
.tdemo-seg{width:100%;display:flex;gap:1.5%;padding:1.4%;background:var(--paper-2);border-radius:12px;margin-top:4%}
.tdemo-seg span{flex:1;text-align:center;padding:2.6% 0;border-radius:9px;font:600 3.3cqw var(--sans);color:var(--ink-3)}
.tdemo-seg .on{background:var(--card);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tdemo-mtitle{width:100%;margin-top:4%;font:400 5cqw var(--serif);color:var(--ink)}
.tdemo-mtitle span{display:block;font:400 3cqw var(--sans);color:var(--ink-2);margin-top:1.5%;line-height:1.4}
/* dial + center readout */
.tdemo-dialwrap{position:relative;width:80%;aspect-ratio:1;margin:2% 0 0}
.tdemo-dialwrap.sleep{width:70%}
.tdemo-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.tdemo-flower{display:flex;align-items:flex-end;justify-content:center;height:44%}
.tdemo-taplabel{margin-top:2%;font:600 2.6cqw var(--sans);letter-spacing:.05em;color:var(--ink-3);text-transform:uppercase}
.tdemo.dark .tdemo-taplabel{color:#D9CFE8}
.tdemo-num{font:500 8.5cqw var(--serif);line-height:1;margin-top:3%}
.tdemo-hint{font:400 2.7cqw var(--sans);color:var(--ink-3);margin-top:1%}
.tdemo.dark .tdemo-hint{color:rgba(237,232,221,.5)}
/* coin preview row */
.tdemo-coinrow{display:flex;align-items:center;gap:6px;margin-top:3.5%;font:700 3.3cqw var(--sans);color:var(--m-gold)}
.tdemo-coinrow em{font-style:normal;font-weight:500;color:var(--ink-3)}
.tdemo.dark .tdemo-coinrow em{color:rgba(237,232,221,.5)}
/* intention / ambient chips */
.tdemo-lbl{width:100%;font:600 2.9cqw var(--sans);letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);margin-top:4%}
.tdemo-lbl em{font-style:normal;letter-spacing:0;text-transform:none;color:var(--ink-4)}
.tdemo-chips{width:100%;display:flex;flex-wrap:wrap;gap:2%;margin-top:2%}
.tdemo-chips span{font:600 3cqw var(--sans);padding:1.8% 3.4%;border-radius:16px;border:1px solid var(--line-2);color:var(--ink-2)}
.tdemo-chips span.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.tdemo-chips span.dash{border-style:dashed;color:var(--ink-3)}
/* begin button */
.tdemo-begin{width:100%;margin-top:5%;padding:3.6% 0;border-radius:14px;text-align:center;background:var(--ink);color:#fff;font:600 3.6cqw var(--sans)}
.tdemo-begin.sleep{background:#EDE8DD;color:#211d2e}
/* sleep specifics */
.tdemo-sleephead{width:100%;text-align:left;margin-top:1%}
.tdemo-sleepnote{width:100%;text-align:center;font:400 2.9cqw var(--sans);color:rgba(237,232,221,.6);margin:3% 0 1%}
.tdemo-sleeptime{font:400 6cqw var(--serif);color:#F2EEE6;margin-top:2%;text-align:center}
.tdemo-sleeptime span{font-size:3.4cqw;color:rgba(237,232,221,.5)}
.tdemo-zone{font:600 3cqw var(--sans);letter-spacing:.04em;margin-top:1.5%;text-align:center}
/* ── running screen (dark session) ── */
.tdemo-runscreen{position:absolute;inset:0;display:flex;flex-direction:column;color:#EDE8DD;background:radial-gradient(120% 90% at 50% 0%,#211E29,#15131A 60%,#0E0D12)}
.tdemo-runtop{display:flex;align-items:center;justify-content:space-between;padding:5% 7% 0}
.tdemo-x{font:400 5cqw var(--sans);opacity:.6}
.tdemo-runtask{font:600 3cqw var(--sans);letter-spacing:.15em;text-transform:uppercase;opacity:.7}
.tdemo-runmid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 8%}
.tdemo-runring{position:relative;width:78%;aspect-ratio:1;display:flex;align-items:center;justify-content:center}
.tdemo-runflower{filter:drop-shadow(0 6px 18px rgba(0,0,0,.4));display:flex;align-items:flex-end;justify-content:center}
.tdemo-runclock{font:400 12cqw var(--serif);letter-spacing:1px;margin-top:4%}
.tdemo-runstage{font:400 2.8cqw var(--sans);color:rgba(237,232,221,.55);margin-top:1.5%}
.tdemo-runtally{display:flex;align-items:center;gap:5px;font:700 3.2cqw var(--sans);color:#E7C66B;margin-top:2.5%}
.tdemo-runline{max-width:70%;text-align:center;font:400 3cqw var(--news);font-style:italic;color:rgba(237,232,221,.6);line-height:1.5;margin-top:3.5%}
.tdemo-runctrl{display:flex;justify-content:center;gap:5%;padding:0 0 8%}
.tdemo-runbtn{width:12cqw;height:12cqw;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#EDE8DD;color:#15131A;font-size:4cqw}
.tdemo-runbtn.ghost{background:transparent;border:1px solid rgba(237,232,221,.22);color:#EDE8DD}
/* ── bloom result (light celebration) ── */
.tdemo-bloomscreen{display:flex;flex-direction:column;align-items:center;text-align:center;width:100%;padding:6% 7% 0}
.tdemo-bloomeyebrow{font:600 3.4cqw var(--sans);letter-spacing:.14em;margin-top:3%}
.tdemo-bloomflower{height:34%;display:flex;align-items:flex-end;justify-content:center;margin-top:3%;transition:none}
.tdemo-bloomtitle{font:400 7cqw var(--serif);margin-top:3%}
.tdemo-bloomdesc{font:400 3cqw var(--sans);color:var(--ink-2);line-height:1.5;margin-top:2.5%;max-width:88%}
.tdemo-bloomstats{display:flex;width:100%;border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-top:5%}
.tdemo-stat{flex:1;padding:3.5% 1%;border-left:1px solid var(--line)}
.tdemo-stat:first-child{border-left:none}
.tdemo-stat b{display:block;font:500 4.4cqw var(--serif)}
.tdemo-stat span{display:block;font:500 2.5cqw var(--sans);color:var(--ink-3);margin-top:3%;letter-spacing:.02em}
.tour-cell-copy{margin-top:24px;max-width:300px}
.tour-cell-t{font:400 clamp(20px,2.2vw,24px) var(--serif);letter-spacing:-.2px;color:var(--ink)}
.tour-cell-d{font:400 15px var(--sans);color:var(--ink-2);line-height:1.6;margin-top:9px}

/* ---- mechanic (留下才开花) ---- */
.mech{background:var(--dark);color:#EDE7DB;border-radius:0;overflow:hidden}
.mech .eyebrow{color:var(--m-gold)}
.mech-grid{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center}
.mech h2{font:400 clamp(30px,4.2vw,46px) var(--serif);line-height:1.1;letter-spacing:-.6px;color:#F4EEE2;margin-bottom:18px}
.mech p{color:rgba(237,231,219,.66);font-size:16px;line-height:1.72;max-width:430px}
.mech-demo{position:relative;aspect-ratio:4/3;border-radius:22px;background:radial-gradient(120% 100% at 50% 0%,#252030,#17141F 60%,#0F0D14);display:flex;align-items:center;justify-content:center;gap:30px;box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
.mech-col{display:flex;flex-direction:column;align-items:center;gap:14px}
.mech-tag{font:600 11px var(--sans);letter-spacing:.14em;text-transform:uppercase;padding:5px 12px;border-radius:20px}
.mech-tag.stay{color:#B8C9A6;background:rgba(143,160,129,.16)}
.mech-tag.leave{color:#D9A8A0;background:rgba(190,110,95,.16)}

/* ---- feature rows ---- */
.frow{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;padding:60px 0}
.frow:nth-child(even) .frow-media{order:-1}
.frow h3{font:400 clamp(26px,3.4vw,36px) var(--serif);line-height:1.12;letter-spacing:-.4px;margin:12px 0 14px}
.frow p{color:var(--ink-2);font-size:16px;line-height:1.7;max-width:420px}
.intent-list{display:flex;flex-direction:column;gap:2px;margin-top:24px}
.intent-item{display:flex;align-items:center;gap:16px;padding:13px 16px;border-radius:14px;transition:background .2s;cursor:default}
.intent-item:hover{background:var(--paper-2)}
.intent-item .nm{font:500 15px var(--sans);color:var(--ink)}
.intent-item .sp{font:400 14px var(--news);font-style:italic;color:var(--ink-3);margin-left:auto}
.media-card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:34px;box-shadow:0 30px 60px -40px rgba(60,50,35,.4)}

footer{border-top:1px solid var(--line);padding:56px 0 40px;background:var(--paper)}

/* ---- fx (flower engine dazzle) ---- */
@keyframes sway{0%,100%{transform:rotate(-1.6deg)}50%{transform:rotate(1.6deg)}}
@keyframes spin-slow{to{transform:rotate(360deg)}}
@keyframes fade-up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes drift{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes twinkle{0%,100%{opacity:.25}50%{opacity:.9}}

@keyframes halo-pulse{0%,100%{opacity:.5;transform:scale(.9)}50%{opacity:.95;transform:scale(1.14)}}

.fx-shimmer::after{content:"";position:absolute;left:6%;top:4%;width:22%;height:70%;border-radius:50%;background:linear-gradient(90deg,transparent,rgba(255,255,250,.98),transparent);filter:blur(1.5px);animation:shimmer-sweep 3.4s var(--ease) infinite;animation-delay:.8s;pointer-events:none;mix-blend-mode:screen}
.fx-iris{animation:hue-flow 5.5s ease-in-out infinite}
.fx-breathe{animation:breathe-bloom 5.5s ease-in-out infinite;transform-origin:center 78%}
.fx-halo{position:absolute;inset:0;margin:auto;border-radius:50%;pointer-events:none;animation:halo-pulse 4s ease-in-out infinite;filter:blur(1px)}
.fx-mote{position:absolute;border-radius:50%;pointer-events:none;animation:mote-float linear infinite}
/* bespoke signature effects — lore-driven, reserved for landmark blooms (#flower-signature-fx) */
/* 彼岸花 lycoris: 黄泉之花 — a slow spectral red underglow that pulses like a heartbeat in the dark, + petals that drift up like departing souls */
@keyframes spectral-pulse{0%,100%{opacity:.32;transform:scale(.92)}50%{opacity:.78;transform:scale(1.12)}}
@keyframes soul-drift{0%{transform:translate(0,4px) scale(.5);opacity:0}20%{opacity:.9}100%{transform:translate(var(--sx,8px),-34px) scale(1.05);opacity:0}}
.fx-spectral{position:absolute;inset:0;margin:auto;border-radius:50%;pointer-events:none;filter:blur(3px);animation:spectral-pulse 3.8s ease-in-out infinite;mix-blend-mode:screen}
.fx-soul{position:absolute;border-radius:50% 50% 50% 0;pointer-events:none;animation:soul-drift ease-in infinite;transform-origin:center}
/* aurora 极光花: a slow shifting iridescent curtain sweeping behind the bloom */
@keyframes aurora-wave{0%,100%{opacity:.4;transform:translateX(-8%) scaleY(.92)}50%{opacity:.85;transform:translateX(8%) scaleY(1.08)}}

/* nightqueen 昙花 / ghostpipe 水晶兰: a cool moon-pale bloom-glow that swells once like a held breath */
@keyframes lumen-breathe{0%,100%{opacity:.35;transform:scale(.9)}50%{opacity:.9;transform:scale(1.16)}}
.fx-lumen{position:absolute;inset:0;margin:auto;border-radius:50%;pointer-events:none;filter:blur(4px);animation:lumen-breathe 5s ease-in-out infinite;mix-blend-mode:screen}
/* firelily 火百合: embers rising + a hot flicker */

@keyframes flame-flicker{0%,100%{opacity:.45;transform:scale(.95)}40%{opacity:.85;transform:scale(1.1)}70%{opacity:.6;transform:scale(1.02)}}
.fx-flame{position:absolute;inset:4%;margin:auto;border-radius:50%;pointer-events:none;filter:blur(5px);animation:flame-flicker 1.9s ease-in-out infinite;mix-blend-mode:screen}
.fx-ember{position:absolute;border-radius:50%;pointer-events:none;animation:ember-rise ease-in infinite}
/* snowlotus 雪莲: drifting frost crystals + a cold pale shimmer */
@keyframes frost-fall{0%{transform:translate(0,-6px) rotate(0deg);opacity:0}20%{opacity:.9}100%{transform:translate(var(--fx,3px),26px) rotate(160deg);opacity:0}}
.fx-frost{position:absolute;pointer-events:none;animation:frost-fall linear infinite;color:#EAF2FF}
/* bluerose 蓝玫瑰: a mystic deep-blue sheen rotating slowly */
@keyframes mystic-spin{to{transform:rotate(360deg)}}
.fx-mystic{position:absolute;inset:-4%;margin:auto;border-radius:50%;pointer-events:none;filter:blur(6px);animation:mystic-spin 9s linear infinite;mix-blend-mode:screen}

/* ===== FLOWER ENGINE (ported verbatim from bloom-garden-pro.html) ===== */
function rng(seed){let s=seed>>>0||1;return()=>{s^=s<<13;s^=s>>>17;s^=s<<5;return((s>>>0)/4294967296);};}
const PAL={
  dawn:['#E2A98F','#D98C6A','#C9A857','#E8C49B'],      // 5-9h warm
  day:['#8FA081','#7E9D98','#A8B58C','#C9B36A'],         // 9-17h green/gold
  dusk:['#C2855E','#A87E8C','#C99A93','#B5896B'],        // 17-21h clay/rose

function mix(a,b,t){const p=h=>{h=h.length===4?'#'+h[1]+h[1]+h[2]+h[2]+h[3]+h[3]:h;return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];};const x=p(a),y=p(b);return '#'+x.map((v,i)=>Math.round(v+(y[i]-v)*t).toString(16).padStart(2,'0')).join('');}
function colDist(a,b){const p=h=>{h=h.length===4?'#'+h[1]+h[1]+h[2]+h[2]+h[3]+h[3]:h;return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];};const x=p(a),y=p(b);return Math.abs(x[0]-y[0])+Math.abs(x[1]-y[1])+Math.abs(x[2]-y[2]);}

function hex2hsl(h){h=h.length===4?'#'+h[1]+h[1]+h[2]+h[2]+h[3]+h[3]:h;let r=parseInt(h.slice(1,3),16)/255,g=parseInt(h.slice(3,5),16)/255,b=parseInt(h.slice(5,7),16)/255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b),l=(mx+mn)/2;let s=0,hh=0;if(mx!==mn){const d=mx-mn;s=l>0.5?d/(2-mx-mn):d/(mx+mn);hh=mx===r?(g-b)/d+(g<b?6:0):mx===g?(b-r)/d+2:(r-g)/d+4;hh*=60;}return[hh,s,l];}

// background and need a separating contour (#pale-contour).
function lum(hex){hex=hex.length===4?'#'+hex[1]+hex[1]+hex[2]+hex[2]+hex[3]+hex[3]:hex;const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;return 0.299*r+0.587*g+0.114*b;}
// a bloom reads as "pale" (risks vanishing on cream/white) when its dominant signature color c1 is very
// light. c1 is deterministic per species (= SP_TINT[0] when tinted), so the contour is stable across seeds;
// c2 is palette-mixed and unreliable to test. Such blooms get a soft contour ring everywhere they render.
function isPaleBloom(d){return lum(d.c1)>0.80;}
function vivid(hex,sBoost,lBoost){const[h,s,l]=hex2hsl(hex);
  // multiplicative + small absolute floor: morandi hues are near-gray, so a pure multiplier barely moves
  // them. The +0.10*sBoost term guarantees a visible pigment lift; cap 0.88 lets rare/legendary read vivid.
  const ns=Math.min(0.88,s*(1+(sBoost||0))+0.12*(sBoost||0));
  return hsl2hex(h,ns,Math.max(0,Math.min(1,l+(lBoost||0))));}
// bouquetGrow(): dial/preview openness as a function of session minutes. Floored at 0.62 so even a
// 5-min pick shows a clearly-open, inviting bloom; eases up to a full 1.0 at long sessions. This is a
// PREVIEW of "how lush this session's flower will be", not the in-session growth animation.
function bouquetGrow(min){const t=Math.max(0,Math.min(1,(min-5)/(120-5)));return 0.62+0.38*Math.pow(t,0.72);}
/* ===== gradient registry =====
   Petals were flat single-fill paths (looked like cut paper). gref() registers a per-petal
   linear gradient (dark base -> color -> light tip) and returns a url(#id); because petals are
   drawn tip-up in local space then rotated, objectBoundingBox gradients rotate with each petal,
   giving every petal proper base→tip shading for free. cref() does the same with a radial gradient
   for domed flower centers. IDs are globally unique (_uid) so dozens of flowers on one page never collide. */
let _uid=0;          // monotonic per-render id base — guarantees gradient ids are unique across the whole document
let _grads=null;     // active registry during a flowerSVG render; null outside (helpers fall back to flat hex)
// rarity-tiered pigment: rarer blooms earn a richer, more saturated petal — dazzle scales with achievement
const SAT_TIER={common:0.12,uncommon:0.34,rare:0.62,epic:0.82,legendary:1.0};
function gref(hex){
  if(!_grads)return hex;
  if(_grads.map[hex])return _grads.map[hex];
  const id=`g${_grads.U}_${_grads.seq++}`;
  const sb=0.42+(_grads.sat||0);   // base body boost + rarity tier
  // richer pigment: saturate the body, deepen the base, keep a luminous tip — 4 stops give petals depth
  const v=vivid(hex,sb,0),deep=vivid(shade(hex,.34),sb*0.7,-0.02),tip=mix(vivid(hex,sb*0.6,0),'#FFFDF7',.38);
  _grads.defs+=`<linearGradient id="${id}" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="${deep}"/><stop offset=".4" stop-color="${v}"/><stop offset=".78" stop-color="${mix(v,tip,.5)}"/><stop offset="1" stop-color="${tip}"/></linearGradient>`;
  return (_grads.map[hex]=`url(#${id})`);
}
function cref(hex){
  if(!_grads)return hex;
  const id=`c${_grads.U}_${_grads.seq++}`;
  const v=vivid(hex,0.38+(_grads.sat||0),0);
  _grads.defs+=`<radialGradient id="${id}" cx=".4" cy=".35" r=".8"><stop offset="0" stop-color="${mix(v,'#fff',.5)}"/><stop offset=".6" stop-color="${v}"/><stop offset="1" stop-color="${shade(v,.3)}"/></radialGradient>`;
  return `url(#${id})`;
}

/* derive DNA from a focus record {min,hour,streak,seed,task,species?} */
function dna(rec){
  const r=rng(rec.seed);
  // palette is driven by palHour when given, else hour. This lets sleep blooms (grown at night, hour:23 for the
  // night GLOW) still wear their canonical daytime color so they match the picker preview — what you pick is what
  // you get. glow/band below still read rec.hour, so the night ambiance is preserved. (#sleep-color-consistency)
  const b=band(rec.palHour!=null?rec.palHour:rec.hour);const pal=PAL[b];
  const species=rec.species||SPECIES[rec.task]||'daisy';
  // sleep moonflowers get a special lavender/silver palette regardless of hour
  let c1=pal[Math.floor(r()*pal.length)];let c2=pal[Math.floor(r()*pal.length)];if(c2===c1)c2=pal[(pal.indexOf(c1)+1)%pal.length];
  // harmony guard: if the two picks are too close they read as a muddy single tone — push c2 a tier lighter so layers separate
  if(colDist(c1,c2)<46)c2=mix(c2,'#FBF6EC',0.34);
  if(species==='moonflower'){c1=['#9A8FB0','#8AA2B8','#A6B0C8'][Math.floor(r()*3)];c2='#C8C2DE';}
  if(SP_TINT[species]){c1=SP_TINT[species][0];c2=mix(SP_TINT[species][1],pal[Math.floor(r()*pal.length)],0.25);}
  // effort score E (0~1) drives fullness/size/rarity — each mode normalises its own effort to a comparable scale.
  // focus → min/60 (45min→0.75→rare, 60min caps; preserves prior focus look), mindful → cycles/20, sleep → healthy-duration window health.
  // callers pass rec.effort; fallback to min/60 keeps focus & legacy/demo records identical to before.
  const E=rec.effort!=null?Math.max(0,Math.min(1,rec.effort)):Math.min(1,rec.min/60);
  const petals=Math.max(7,Math.min(15,Math.round(E*9)+6+Math.floor(r()*3)));
  const layers=E>=0.66?4:E>=0.33?3:2;   // always ≥2 layers so even short sessions read full & lush
  const size=0.62+0.5*E+r()*0.1;
  const sharp=r();
  const ctrCol=mix(c1,'#F2EFE8',0.45);
  // a species carries an intrinsic rarity floor; a high-effort session can still push a humble bloom up a tier (#4)
  // free play tops out at 'rare' — epic/legendary are reserved for paid / achievement / lucky-gacha tracks
  const earned=E>=0.75?'rare':rec.streak>=7?'uncommon':'common';
  const ORD=['common','uncommon','rare','epic','legendary'];
  const isMoon=species==='moonflower'||species.startsWith('moon_');
  const floor=isMoon?(SP_RARITY[species]||'rare'):(SP_RARITY[species]||'common');
  const rare=ORD[Math.max(ORD.indexOf(floor),ORD.indexOf(earned))];
  const glow=band(rec.hour)==='night'||isMoon;
  return {species,c1,c2,ctrCol,petals,layers,size,sharp,band:band(rec.hour),glow,rare,dots:2+Math.floor(r()*5),
          twist:(r()-0.5)*16,stemH:34+Math.floor(r()*16),leaf:r()>0.35,bud:r()>0.6,v:r()};
}

/* ===== per-species silhouette builders =====
   each returns the bloom-head markup (stem drawn separately). open:0..1 */
function petal(len,wid,sharp){
  return `M0 0 C ${wid} ${-len*0.2} ${wid*0.8} ${-len*0.7} 0 ${-len} ${sharp>0.5?`Q ${-wid*0.4} ${-len*0.6} 0 0`:`C ${-wid*0.3} ${-len*0.95} ${-wid*0.7} ${-len*0.5} 0 0`} Z`;
}
function headDaisy(d,cx,cy,open){ // classic radial — round, friendly
  const len=20*d.size*(0.4+0.6*open),wid=8*d.size;let s='';
  for(let L=0;L<d.layers;L++){const lr=1-L*0.22,n=d.petals-L*2,col=L%2?d.c2:d.c1,rot=d.twist+L*(180/d.petals);
    for(let i=0;i<n;i++){const tf=`translate(${cx} ${cy-L*1.2}) rotate(${rot+i*(360/n)})`;
      s+=`<path d="${petal(len*lr,wid*lr,d.sharp)}" fill="${gref(col)}" opacity="${0.96-L*0.08}" transform="${tf}"/>`;
      s+=`<path d="M0 -${len*lr*0.12} L0 -${len*lr*0.82}" stroke="${shade(col,.3)}" stroke-width="${0.5*d.size}" stroke-linecap="round" opacity=".28" transform="${tf}"/>`;}}  // faint mid-vein
  const cr=5.5*d.size*(0.5+0.5*open);s+=`<circle cx="${cx}" cy="${cy}" r="${cr}" fill="${cref(d.ctrCol)}"/>`;
  for(let i=0;i<d.dots;i++){const a=i*(360/d.dots)*Math.PI/180;s+=`<circle cx="${cx+Math.cos(a)*cr*0.45}" cy="${cy+Math.sin(a)*cr*0.45}" r="${1.1*d.size}" fill="${mix(d.c2,'#3a3128',.3)}" opacity=".75"/>`;}
  s+=`<circle cx="${cx-cr*0.3}" cy="${cy-cr*0.3}" r="${1.3*d.size}" fill="#FFFDF5" opacity=".7"/>`;   // dew highlight
  return s;
}
function headTulip(d,cx,cy,open){ // closed cup — 3 overlapping upright petals
  const h=30*d.size,w=11*d.size*(0.7+0.3*open);
  const cup=(dx,col,sc)=>`<path d="M${cx+dx} ${cy} C ${cx+dx-w*sc} ${cy-h*0.3} ${cx+dx-w*sc*0.7} ${cy-h*sc} ${cx+dx} ${cy-h*sc} C ${cx+dx+w*sc*0.7} ${cy-h*sc} ${cx+dx+w*sc} ${cy-h*0.3} ${cx+dx} ${cy} Z" fill="${gref(col)}"/>`;
  return cup(-w*0.5,d.c2,0.92)+cup(w*0.5,d.c2,0.92)+cup(0,d.c1,1);
}
function headBell(d,cx,cy,open){ // hanging bell clusters along arched stalk

  return s;
}
function headPoppy(d,cx,cy,open){ // 4-6 wide crinkled bowl petals + dark center

function headLotus(d,cx,cy,open){ // many pointed layered petals — serene, wide

function headClover(d,cx,cy,open){ // 3-4 rounded lobes — small, ground cover

  s+=`<circle cx="${cx}" cy="${cy}" r="${2.5*d.size}" fill="${cref(d.ctrCol)}"/>`;return s;

function headLavender(d,cx,cy,open){ // vertical spike of tiny florets

function headRose(d,cx,cy,open){ // spiral layered — premium

function headMoonflower(d,cx,cy,open){ // sleep species — 5 broad luminous petals, pale glow

function headBreath(d,cx,cy,open){ // mindfulness species — concentric calm rings of soft petals

/* ===== bespoke silhouettes — one shape per species, no colour-swap clones (#flower-shapes) ===== */

function headSpiderLily(d,cx,cy,open){ // 彼岸花/lycoris — recurved thread-petals + very long upswept stamens (no leaves; lore-driven)

function headDahlia(d,cx,cy,open){ // 大丽花 — geometric ball-dahlia: many rolled pointed petals in tight concentric rings, quilled tips

function headMagnolia(d,cx,cy,open){ // 玉兰 — 6-9 large upright tepals forming an open chalice/goblet, broad at tip

  provence:{sky:['#A7C3E6','#CCDDED','#F0E7D0','#E6D6BA'],cel:{t:'sun',x:71,y:30,r:9,c:'#FDEBB6'},ridges:[['#94A6C6',.5],['#A6BBA4',.85]],ground:['#B7A2D0','#8A6FB0']},
  tuscany:{sky:['#F3C284','#F6D7A2','#F1E3C0','#E0CD9F'],cel:{t:'sun',x:30,y:34,r:12,c:'#FFD98A'},ridges:[['#C7A874',.55],['#B59A5E',.9]],ground:['#C3AC6E','#9C8649']},
  vangogh:{sky:['#162A57','#21407B','#356094','#3E6FA0'],cel:{t:'moon',x:72,y:24,r:9,c:'#F3E7A0'},ridges:[['#152340',.7],['#1B2D44',.95]],ground:['#1E2E2B','#14201E']},
};
function SceneThumb({scene='tuscany',w=48,h=42}){
  const sc=SCENE_THUMBS[scene],uid='st-'+scene;
  const skyStops=sc.sky.map((c,i)=>`<stop offset="${(i/(sc.sky.length-1)*100)|0}%" stop-color="${c}"/>`).join('');
  const cel=sc.cel;
  const celBody=cel.t==='moon'
    ? `<circle cx="${cel.x}" cy="${cel.y}" r="${cel.r}" fill="${cel.c}"/><circle cx="${cel.x+cel.r*.4}" cy="${cel.y-cel.r*.25}" r="${cel.r*.9}" fill="${sc.sky[1]}"/>`
    : `<circle cx="${cel.x}" cy="${cel.y}" r="${cel.r}" fill="${cel.c}"/>`;
  const ridges=sc.ridges.map((rg,i)=>`<path d="M0 ${58+i*10} Q30 ${50+i*10} 55 ${57+i*10} T100 ${55+i*10} L100 130 L0 130Z" fill="${rg[0]}" opacity="${rg[1]}"/>`).join('');
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" preserveAspectRatio="xMidYMid slice">`
    +`<defs><linearGradient id="sky-${uid}" x1="0" y1="0" x2="0" y2="1">${skyStops}</linearGradient>`
    +`<linearGradient id="gnd-${uid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${sc.ground[0]}"/><stop offset="100%" stop-color="${sc.ground[1]}"/></linearGradient></defs>`
    +`<rect width="100" height="130" fill="url(#sky-${uid})"/>${celBody}${ridges}`
    +`<rect y="82" width="100" height="48" fill="url(#gnd-${uid})"/></svg>`;
  return <span style={{display:'block',width:w,height:h,borderRadius:8,overflow:'hidden'}} dangerouslySetInnerHTML={{__html:svg}}/>;
}

const easeOut=x=>1-Math.pow(1-x,3);
const _pad2=n=>String(n).padStart(2,'0');
const fmtClock=s=>{s=Math.max(0,Math.ceil(s));return _pad2(Math.floor(s/60))+':'+_pad2(s%60);};
function useTourClock(mode){
  const [tick,setTick]=useState(0);
  const boxRef=useRef();const raf=useRef();const vis=useRef(false);   // start paused until scrolled into view
  const elapsed=useRef(0);const last=useRef(null);                    // accumulate ONLY the time spent visible
  useEffect(()=>{
    const el=boxRef.current;
    const io=new IntersectionObserver(([e])=>{vis.current=e.isIntersecting;},{threshold:.2});
    if(el)io.observe(el);
    const LOOP=8000+(mode==='mindful'?700:mode==='sleep'?1400:0);   // slight offset so the three cards run out of sync
    const step=(now)=>{
      if(vis.current){
        if(last.current!=null)elapsed.current+=now-last.current;     // advance only while in view
        last.current=now;
        setTick((elapsed.current%LOOP)/LOOP);
      }else{
        last.current=null;                                            // frozen; resume cleanly next time it's visible
      }
      raf.current=requestAnimationFrame(step);
    };
    raf.current=requestAnimationFrame(step);
    return()=>{cancelAnimationFrame(raf.current);if(el)io.disconnect();};
  },[mode]);
  return [tick,boxRef];
}
function TourDemo({mode,lang}){
  const cfg=TOUR_DEMOS[mode];
  const [tick,boxRef]=useTourClock(mode);
  const L=i=>lang==='zh'?i[0]:i[1];
  const t=tick;
  // ── the full loop timeline, in normalized time (0..1) ──
  //  setup  : dial sweeps to the chosen value                     [0    .20)
  //  → run  : cross into the dark running screen, timer counts,
  //           flower grows through its lifecycle stages           [.20  .74)
  //  → bloom: cross into the light result screen, full bloom      [.74  .96)
  //  → reset back to setup                                        [.96  1  )
  const P={setupEnd:.20,runStart:.24,runEnd:.72,bloomStart:.76,bloomEnd:.96};
  let phase,ph;   // ph = 0..1 progress *within* the phase
  if(t<P.runStart){phase='setup';ph=Math.min(1,t/P.setupEnd);}
  else if(t<P.bloomStart){phase='run';ph=Math.min(1,Math.max(0,(t-P.runStart)/(P.runEnd-P.runStart)));}
  else{phase='bloom';ph=Math.min(1,Math.max(0,(t-P.bloomStart)/(P.bloomEnd-P.bloomStart)));}
  // crossfade windows between screens
  const XF=.04;
  const fadeSetup=t<P.setupEnd?1:t<P.runStart?1-(t-P.setupEnd)/(P.runStart-P.setupEnd):0;
  const fadeRun=t<P.runStart?0:t<P.runStart+XF?(t-P.runStart)/XF:t<P.bloomStart?1:t<P.bloomStart+XF?1-(t-P.bloomStart)/XF:0;
  const fadeBloom=t<P.bloomStart?0:t<P.bloomStart+XF?(t-P.bloomStart)/XF:t>P.bloomEnd?Math.max(0,1-(t-P.bloomEnd)/(1-P.bloomEnd)):1;
  const isDark=(phase==='run')||(mode==='sleep'&&phase!=='bloom');   // run screen is always dark; sleep setup is dark too
  return (
    <div ref={boxRef} className={'tdemo'+(isDark?' dark':'')}>
      <div className="tdemo-bar"><span>9:41</span><span className="tdemo-notch"/><span className="tdemo-sig"/></div>
      <div className="tdemo-stack">
        {fadeSetup>0.01&&<div className="tdemo-layer" style={{opacity:fadeSetup}}>
          <div className="tdemo-scroll">
            {mode==='sleep'
              ? <TourSleep cfg={cfg} L={L} dialP={phase==='setup'?easeOut(ph):1} stage={0} growing={false}/>
              : <TourDial cfg={cfg} mode={mode} L={L} dialP={phase==='setup'?easeOut(ph):1} stage={0} growing={false}/>}
          </div>
          <TourTabs L={L}/>
        </div>}
        {fadeRun>0.01&&<div className="tdemo-layer" style={{opacity:fadeRun}}>
          <TourRun cfg={cfg} mode={mode} L={L} ph={ph}/>
        </div>}
        {fadeBloom>0.01&&<div className="tdemo-layer" style={{opacity:fadeBloom}}>
          <div className="tdemo-scroll">
            <TourBloom cfg={cfg} mode={mode} L={L} ph={ph}/>
          </div>
          <TourTabs L={L}/>
        </div>}
      </div>
    </div>
  );
}

          {Array.from({length:24}).map((_,i)=>{const a=i/24*2*Math.PI,r1=R-26,r2=R-20;return <line key={i} x1={160+r1*Math.cos(a)} y1={160+r1*Math.sin(a)} x2={160+r2*Math.cos(a)} y2={160+r2*Math.sin(a)} stroke="var(--line-2)" strokeWidth="2"/>;})}

/* setup screen (sleep) — 24h ring with bedtime · wake handles, moonflower previews window health */
function TourSleep({cfg,L,dialP}){
  const R=96,CX=130,CY=130;
  const bedM=23*60;                       // 23:00 fixed bedtime
  const wakeTarget=7*60;                   // sweeps toward 07:00 (8h window)
  const startWake=1*60;                    // opens from a short 2h window
  const wakeM=Math.round((startWake+(wakeTarget-startWake)*dialP)/5)*5;
  const dur=((wakeM-bedM+1440)%1440)||1440,h=dur/60;
  const polar=m=>{const a=(m/1440)*2*Math.PI-Math.PI/2;return [CX+R*Math.cos(a),CY+R*Math.sin(a)];};
  const [bx,by]=polar(bedM),[wx,wy]=polar(wakeM),large=dur>720?1:0;
  const health=(h>=7&&h<=9)?1:Math.max(0.1,1-Math.abs(h-8)*0.2);
  const grow=0.5+0.5*health;
  const flower=useMemo(()=><Bloom species="moonflower" seed={cfg.seed} min={dur} hour={23} size={78} grow={grow}/>,[grow,cfg.seed]);
  const toT=m=>String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');
  const zone=h<7?L(['偏短','short']):h>9?L(['偏长','long']):L(['理想区间','ideal']);
  const zoneCol=(h>=7&&h<=9)?'#A6E0C8':'#E0C8A6';
  return (
    <React.Fragment>
      <div className="tdemo-sleephead">
        <div className="tdemo-eyebrow">{L(cfg.eyebrow)}</div>
        <div className="tdemo-title">{L(cfg.title)}<i>{L(cfg.titleIt)}</i></div>
      </div>
      <div className="tdemo-sleepnote">{L(['拖动把手设定作息窗口','Drag the handles to set your window'])}</div>
      <div className="tdemo-dialwrap sleep">
        <svg viewBox="0 0 260 260" width="100%" height="100%">
          <circle cx={CX} cy={CY} r={R} fill="none" stroke="rgba(237,232,221,.16)" strokeWidth="14"/>
          {Array.from({length:24}).map((_,i)=>{const a=i/24*2*Math.PI-Math.PI/2,r1=R+13,r2=R+(i%6===0?20:17);return <line key={i} x1={CX+r1*Math.cos(a)} y1={CY+r1*Math.sin(a)} x2={CX+r2*Math.cos(a)} y2={CY+r2*Math.sin(a)} stroke={'rgba(237,232,221,'+(i%6===0?.45:.2)+')'} strokeWidth={i%6===0?2:1}/>;})}
          <path d={`M ${bx} ${by} A ${R} ${R} 0 ${large} 1 ${wx} ${wy}`} fill="none" stroke="var(--m-lav)" strokeWidth="14" strokeLinecap="round"/>
          <g><circle cx={bx} cy={by} r="13" fill="#211d2e" stroke="var(--m-lav)" strokeWidth="3"/><text x={bx} y={by+3} textAnchor="middle" fill="#EDE8DD" style={{font:'700 11px var(--sans)'}}>☾</text></g>
          <g><circle cx={wx} cy={wy} r="13" fill="#211d2e" stroke="#E7C77E" strokeWidth="3"/><text x={wx} y={wy+3} textAnchor="middle" fill="#EDE8DD" style={{font:'700 10px var(--sans)'}}>☀</text></g>
        </svg>
        <div className="tdemo-center">
          <div className="tdemo-flower">{flower}</div>
          <span className="tdemo-taplabel">{L(cfg.tapLabel)}</span>
        </div>
      </div>
      <div className="tdemo-sleeptime">{toT(bedM)} → {toT(wakeM)} <span>· {Math.floor(dur/60)}h {dur%60}m</span></div>
      <div className="tdemo-zone" style={{color:zoneCol}}>{Math.floor(dur/60)}h {dur%60}m · {zone}</div>
      <div className="tdemo-coinrow"><span className="tdemo-coindot"/>{cfg.coin} <em>{L(cfg.coinLabel)}</em></div>
      <div className="tdemo-begin sleep">🌙 {L(cfg.begin)}</div>
    </React.Fragment>
  );
}
/* running screen — the dark focus/mindful/sleep session: timer counts down (sped up), flower grows through
   its lifecycle stages, coins tally up. Mirrors the app's FocusScreen. */
function TourRun({cfg,mode,L,ph}){
  const prog=ph;                              // 0→1 accelerated "session" progress
  const stIdx=TOUR_STAGES.reduce((a,s,i)=>prog>=s[0]?i:a,0);
  const stage=TOUR_STAGES[stIdx][0];
  const stageLabel=TOUR_STAGES[stIdx][1];
  const qs=Math.round(prog*24)/24;            // quantize the grow so the SVG rebuilds ~25×
  const flower=useMemo(()=><Bloom species={cfg.sp} seed={cfg.seed} min={mode==='focus'?100:80} hour={cfg.hour} size={150} stage={qs}/>,[qs,mode,cfg.sp]);
  const R=128,C=2*Math.PI*R;
  // pretty countdown: focus 25:00→0, mindful shows round x/10, sleep shows a clock winding to morning
  const remainTxt=mode==='mindful'
    ? Math.max(1,Math.ceil(prog*cfg.target))+' / '+cfg.target
    : mode==='sleep'
      ? fmtClock((1-prog)*8*3600/60)         // compressed 8h shown as mm:ss winding down
      : fmtClock((1-prog)*25*60);
  const line=mode==='focus'?L(['留下来。每一分钟都会再绽开一片花瓣。','Stay. Each minute opens another petal.'])
    :mode==='mindful'?L(['跟随节奏，慢慢呼吸。','Follow the rhythm, breathe slow.'])
    :L(['安睡吧，你的花会在夜里悄悄生长。','Sleep. Your bloom grows through the night.']);
  return (
    <div className="tdemo-runscreen">
      <div className="tdemo-runtop">
        <span className="tdemo-x">✕</span>
        <span className="tdemo-runtask">{L(cfg.task)}</span>
        <span style={{width:14}}/>
      </div>
      <div className="tdemo-runmid">
        <div className="tdemo-runring">
          <svg viewBox="0 0 300 300" width="100%" height="100%" style={{position:'absolute',transform:'rotate(-90deg)'}}>
            <circle cx="150" cy="150" r={R} fill="none" stroke="rgba(237,232,221,.12)" strokeWidth="2.5"/>
            <circle cx="150" cy="150" r={R} fill="none" stroke={cfg.runRing} strokeWidth="3" strokeLinecap="round" strokeDasharray={C} strokeDashoffset={C*(1-prog)}/>
          </svg>
          <div className="tdemo-runflower">{flower}</div>
        </div>
        <div className="tdemo-runclock">{remainTxt}</div>
        <div className="tdemo-runstage">{L(stageLabel)} · {Math.round(prog*100)}%</div>
        <div className="tdemo-runtally"><span className="tdemo-coindot"/>{Math.round((cfg.coin.replace('+','')|0)*prog)}</div>
        <div className="tdemo-runline">{line}</div>
      </div>
      <div className="tdemo-runctrl">
        <span className="tdemo-runbtn ghost">♪</span>
        <span className="tdemo-runbtn">❙❙</span>
      </div>
    </div>
  );
}

/* ---------- 滚动揭示 ---------- */
function useReveal(){
  useEffect(()=>{
    const els=document.querySelectorAll('.reveal');
    const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:0.12});
    els.forEach(el=>io.observe(el));
    return()=>io.disconnect();
  },[]);
}

/* ---------- 根组件 ---------- */
function App(){
  const {lang,setLang,t}=useLang();
  useReveal();
  return (
